<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .green {
            background-color: rgb(129, 188, 94);
        }

        .yellow {
            background-color: rgb(240, 181, 77);
        }

        .red{
            background-color: rgb(188, 94, 94);
        }

        .container {
            display: grid;
            grid-template-columns: 200px 410px 200px;
            grid-template-rows: 125px 125px 125px;
            gap: 10px;
            justify-content: center;
        }

        .first-block {
            grid-row: 1 / 4;
        }

        .sec-block {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
        }

        .third-col {
            display: grid;
            grid-template-rows: 150px auto;
        }

        .in-col {
            display: grid;
            grid-template-columns: 200px 200px;
            grid-template-rows: 125px 125px;
            gap: 10px;
            grid-column: 2 / 3;
            grid-row: 2 / 4;
        }

        .fourth-block {
            grid-row: 2 / 4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="first-col green first-block"></div>

        <div class="green sec-block"></div>
        
        <div class="in-col">
            <div class="yellow third-block"></div>
            <div class="red third-block"></div>
            <div class="red third-block"></div>
            <div class="yellow third-block"></div>
        </div>

        <div class="red third-block"></div>
        <div class="green fourth-block"></div>
    </div>
</body>
</html>
